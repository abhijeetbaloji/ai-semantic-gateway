# =========================
# Server
# =========================
server.port=8080

# =========================
# PostgreSQL (defaults for docker-compose; override with env vars in prod)
# =========================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/semantic_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# =========================
# OpenAI  (empty key is fine when openai.mock=true)
# =========================
openai.api.key=${OPENAI_API_KEY:}
openai.mock=${OPENAI_MOCK:true}

# =========================
# Semantic cache
# =========================
semantic.cache.threshold=${CACHE_THRESHOLD:0.90}
semantic.cache.prompt.max-length=${PROMPT_MAX_LENGTH:8000}

# =========================
# Logging
# =========================
logging.level.com.semantic.gateway=INFO
logging.level.org.hibernate.SQL=WARN

# =========================
# Error hardening
# =========================
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-exception=false
server.error.include-binding-errors=never
